out_dir: results
metric_best: accuracy
metric_agg: argmax
wandb:
  use: False
  project: ENZYMES
dataset:
  format: PyG-TUDataset
  name: ENZYMES
  task: graph
  task_type: classification
  transductive: False
  node_encoder: True
  node_encoder_name: LinearNode+LapPE  # Pbase: LapPE as structural encoding
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: RicciEdge  # C3: Pbase + Ricci edge SE (H1)
  edge_encoder_bn: False
  split_mode: cv-stratifiedkfold-10
  split_index: 0
  split_dir: splits
posenc_LapPE:
  enable: True
  eigen:
    laplacian_norm: sym
    eigvec_norm: L2
    max_freqs: 8
  model: DeepSet
  dim_pe: 8
  layers: 2
  raw_norm_type: none
ricci:
  enable: True
  variant: ollivier
  alpha: 0.5
  normalize: zscore
train:
  mode: custom
  batch_size: 32
  eval_period: 1
  ckpt_period: 100
model:
  type: GPSModel
  loss_fun: cross_entropy
  edge_decoding: dot
  graph_pooling: mean
gt:
  layer_type: GINE+Transformer
  layers: 3
  n_heads: 4
  dim_hidden: 64
  dropout: 0.0
  attn_dropout: 0.5
  layer_norm: False
  batch_norm: True
gnn:
  head: default
  layers_pre_mp: 0
  layers_post_mp: 2
  dim_inner: 64
  batchnorm: True
  act: relu
  dropout: 0.0
  agg: mean
  normalize_adj: False
optim:
  clip_grad_norm: True
  optimizer: adamW
  weight_decay: 1e-4
  base_lr: 0.001
  max_epoch: 300
  scheduler: cosine_with_warmup
  num_warmup_epochs: 20
